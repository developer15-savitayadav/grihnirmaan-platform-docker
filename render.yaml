services:
  - type: web
    name: grihnirmaan
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: APP_NAME
        value: GrihNirmaan

      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: "false"

      - key: APP_KEY
        sync: false

      - key: APP_URL
        sync: false

      - key: APP_TIMEZONE
        value: Asia/Kolkata

      - key: LOG_CHANNEL
        value: stderr

      - key: LOG_LEVEL
        value: info

      - key: DB_CONNECTION
        sync: false

      - key: DB_HOST
        sync: false

      - key: DB_PORT
        value: "3306"

      - key: DB_DATABASE
        sync: false

      - key: DB_USERNAME
        sync: false

      - key: DB_PASSWORD
        sync: false

      - key: SESSION_DRIVER
        value: database

      - key: CACHE_STORE
        value: database

      - key: QUEUE_CONNECTION
        value: sync

      - key: FILESYSTEM_DISK
        value: local

      - key: MAIL_MAILER
        value: log

      - key: RUN_MIGRATIONS
        value: "true"

      - key: RUN_SEEDERS
        value: "false"