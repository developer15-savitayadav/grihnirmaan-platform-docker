user www-data;
worker_processes auto;
pid /run/nginx.pid;

error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 25M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

    server {
        listen 10000 default_server;
        server_name _;

        # Compiled React/Vite application.
        root /var/www/frontend;
        index index.html;

        # Laravel public files (Filament, Livewire, storage links, etc.).
        location ^~ /storage/ {
            alias /var/www/backend/public/storage/;
            try_files $uri =404;
            access_log off;
            expires 7d;
        }

        location ^~ /vendor/ {
            alias /var/www/backend/public/vendor/;
            try_files $uri =404;
            access_log off;
            expires 7d;
        }

        # Requests that must be handled by Laravel.
        location ~ ^/(api|admin|livewire|broadcasting|sanctum|webhooks|newsletter|leads|nri/leads|quote/download|mobile-login|login|logout|register|forgot-password|reset-password|verify-email|confirm-password)(/|$) {
            try_files $uri /laravel-index.php?$query_string;
        }

        # Laravel health endpoint.
        location = /up {
            try_files $uri /laravel-index.php?$query_string;
        }

        # Internal Laravel front controller.
        location = /laravel-index.php {
            internal;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
            fastcgi_param SCRIPT_NAME /index.php;
            fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
            fastcgi_param HTTP_PROXY "";
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_read_timeout 120;
        }

        # Existing backend public assets, then React assets.
        location ~* \.(?:css|js|mjs|map|jpg|jpeg|png|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
            try_files /backend-public$uri $uri =404;
            access_log off;
            expires 7d;
        }

        # Standalone React Router fallback.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Map backend public assets through an internal URI.
        location ^~ /backend-public/ {
            internal;
            alias /var/www/backend/public/;
        }
    }
}
